<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HENA Site 36</title>
    <link rel="icon" type="image/png" href="icons/harsco.png">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;}
        #map {
            background: #334155;
            width: 100%;
            height: 100%;}
        .leaflet-control-layers-toggle {
            background: url('icons/harsco.png') no-repeat center center !important;
            background-size: 20px 20px !important;
            width: 30px !important;
            height: 30px !important;}
        #contextMenu {
            color: white;
            background-color: rgb(0, 0, 0);
            border: 1px solid #ffffff;
            border-radius: 4px;}
        #contextMenu ul {
            margin: 0;
            padding: 0;
            list-style: none;}
        #contextMenu li {
            padding: 5px 10px;
            cursor: pointer;}

        /* Search Modal Responsive Styles */
        #searchModal {
            position: fixed;
            bottom: 8px;
            right: 8px;
        }
        
        @media (max-width: 599px) {
            #searchModal {
                width: calc(100vw - 16px);
                max-width: calc(100vw - 16px);
            }
        }

        @media (min-width: 600px) {
            #searchModal {
                width: 500px;
            }
        }

        /* Ensure button styling consistency */
        #searchModalBackdrop button {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }

        #searchPanelToggle:active {
            transform: scale(0.95);
        }

        /* Dashboard toggle button */
        #dashToggleBtn {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1100;
            width: 38px;
            height: 38px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.25);
            background: #1e293b;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        #dashToggleBtn:hover { background: #334155; color: #fff; }

        /* Dashboard view */
        #dashboard {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a;
            color: #e2e8f0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            z-index: 1050;
            overflow-y: auto;
            padding: 0 0 32px 0;
        }

        /* Dashboard header bar */
        #dashHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        #dashHeader h1 {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #cbd5e1;
        }
        .dash-year-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dash-year-nav button {
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            border-radius: 4px;
            width: 28px;
            height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .dash-year-nav button:hover:not(:disabled) { background: #475569; color: #fff; }
        .dash-year-nav button:disabled { opacity: 0.3; cursor: default; }
        #dashYearLabel {
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
            min-width: 50px;
            text-align: center;
        }
        #dashBackBtn {
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            border-radius: 4px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: background 0.15s;
        }
        #dashBackBtn:hover { background: #475569; color: #fff; }

        /* 4x3 month grid */
        #dashGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 16px 20px;
        }

        @media (max-width: 900px) {
            #dashGrid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            #dashGrid { grid-template-columns: 1fr; }
        }

        /* Month card */
        .dash-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px 16px;
            min-height: 200px;
        }
        .dash-card--current {
            border-color: #22c55e;
            box-shadow: 0 0 0 1px #22c55e44;
        }
        .dash-card--empty {
            opacity: 0.4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            font-size: 13px;
        }
        .dash-card-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #94a3b8;
            margin: 0 0 10px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }
        .dash-card-title.current { color: #22c55e; }
        .dash-metric {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 12px;
            padding: 3px 0;
            border-bottom: 1px solid #1e293b;
            gap: 8px;
        }
        .dash-metric-label {
            color: #64748b;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .dash-metric-value {
            color: #e2e8f0;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            text-align: right;
        }
        .dash-metric-value.positive { color: #22c55e; }
        .dash-metric-value.negative { color: #f87171; }
        .dash-metric-divider {
            margin: 6px 0;
            border: none;
            border-top: 1px solid #334155;
        }

        /* Compare bar (metric chips) */
        #dashCompareBar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 20px 2px 20px;
        }
        #dashCompareBar .cb-label {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #64748b; margin-right: 4px;
        }
        .dash-chip {
            background: none; border: 1px solid #334155; color: #94a3b8;
            border-radius: 999px; padding: 4px 12px; font-size: 12px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
            transition: border-color 0.12s, color 0.12s;
        }
        .dash-chip:hover { border-color: #475569; color: #e2e8f0; }
        .dash-chip .dot { width: 8px; height: 8px; border-radius: 50%; display: none; }
        .dash-chip.on1 { border-color: #3987e5; color: #e2e8f0; background: rgba(57,135,229,0.13); }
        .dash-chip.on1 .dot { display: inline-block; background: #3987e5; }
        .dash-chip.on2 { border-color: #c98500; color: #e2e8f0; background: rgba(201,133,0,0.13); }
        .dash-chip.on2 .dot { display: inline-block; background: #c98500; }
        .dash-chip.sm { padding: 2px 10px; font-size: 11px; }
        #dashClearSel { border-style: dashed; display: none; }
        #dashCompareHint { font-size: 11px; color: #64748b; margin-left: 4px; }

        /* Trend panel (12-month charts / table view) */
        #dashTrend { padding: 10px 20px 0 20px; display: none; }
        .dash-trend-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            padding: 14px 16px 10px; margin-bottom: 10px;
        }
        .dash-trend-head {
            display: flex; align-items: baseline; justify-content: space-between;
            gap: 12px; flex-wrap: wrap; margin-bottom: 4px;
        }
        .dash-trend-title {
            font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
            text-transform: uppercase; color: #e2e8f0;
        }
        .dash-trend-title .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 7px; }
        .dash-trend-stats { display: flex; gap: 20px; flex-wrap: wrap; font-size: 12px; color: #94a3b8; }
        .dash-trend-stats b { color: #e2e8f0; font-variant-numeric: tabular-nums; }
        .dash-chart-box svg { display: block; width: 100%; height: auto; }
        .dash-tv-toggle {
            background: none; border: 1px solid #334155; color: #94a3b8;
            border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer; font-family: inherit;
        }
        .dash-tv-toggle:hover { color: #e2e8f0; border-color: #475569; }
        #dashTrendTableWrap { overflow-x: auto; }
        #dashTrendTableWrap table { border-collapse: collapse; width: 100%; font-size: 12px; }
        #dashTrendTableWrap th, #dashTrendTableWrap td {
            padding: 5px 10px; text-align: right; border-bottom: 1px solid #334155;
            font-variant-numeric: tabular-nums;
        }
        #dashTrendTableWrap th { color: #64748b; font-weight: 600; }
        #dashTrendTableWrap td:first-child, #dashTrendTableWrap th:first-child { text-align: left; }
        .dash-delta-up { color: #22c55e; }
        .dash-delta-dn { color: #f87171; }
        .dash-delta-nil { color: #64748b; }

        /* Month card: clickable title + selectable metric rows */
        .dash-card-title-btn {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; background: none; border: none; cursor: pointer;
            padding: 0 0 8px 0; margin: 0 0 8px 0; border-bottom: 1px solid #334155;
            font-family: inherit; font-size: 13px; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase; color: #94a3b8;
        }
        .dash-card-title-btn:hover { color: #e2e8f0; }
        .dash-card-title-btn .open-hint {
            font-size: 10px; font-weight: 400; letter-spacing: 0.02em;
            text-transform: none; color: #64748b;
        }
        .dash-card-title-btn:hover .open-hint { color: #3987e5; }
        .dash-card-title-btn.current { color: #22c55e; }
        .dash-mrow {
            display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
            background: none; border: none; text-align: left; cursor: pointer;
            font-size: 12px; padding: 3px 6px; margin: 0 -6px; width: calc(100% + 12px);
            border-radius: 4px; font-family: inherit;
        }
        .dash-mrow:hover { background: rgba(148,163,184,0.08); }
        .dash-mrow .lbl { color: #64748b; white-space: nowrap; }
        .dash-mrow .val {
            color: #e2e8f0; font-weight: 600;
            font-variant-numeric: tabular-nums; text-align: right;
        }
        .dash-mrow .val .unit { color: #475569; font-weight: 400; }
        .dash-mrow .val.pos { color: #22c55e; }
        .dash-mrow .val.neg { color: #f87171; }
        .dash-mrow.sel1 { background: rgba(57,135,229,0.13); box-shadow: inset 2px 0 0 #3987e5; }
        .dash-mrow.sel2 { background: rgba(201,133,0,0.13); box-shadow: inset 2px 0 0 #c98500; }

        /* Chart tooltip */
        #dashTip {
            position: fixed; z-index: 1300; display: none; pointer-events: none;
            background: #0b1120; border: 1px solid #475569; border-radius: 6px;
            padding: 7px 10px; font-size: 12px; line-height: 1.45; max-width: 240px;
            color: #e2e8f0; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        #dashTip .tip-head { font-weight: 700; margin-bottom: 2px; }
        #dashTip .tip-mut { color: #94a3b8; }

        /* Month drill-down overlay */
        #dashOvl {
            position: fixed; inset: 0; z-index: 1200; display: none;
            background: rgba(2,6,23,0.72); overflow-y: auto; padding: 4vh 16px;
            color: #e2e8f0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        #dashOvlPanel {
            max-width: 960px; margin: 0 auto; background: #1e293b;
            border: 1px solid #475569; border-radius: 10px;
        }
        #dashOvlHead {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; padding: 14px 18px; border-bottom: 1px solid #334155;
        }
        #dashOvlHead h2 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
        #dashOvlClose {
            background: #334155; border: 1px solid #475569; color: #94a3b8;
            border-radius: 4px; width: 28px; height: 28px; cursor: pointer; font-size: 14px;
        }
        #dashOvlClose:hover { background: #475569; color: #fff; }
        #dashOvlBody { padding: 14px 18px 20px; }
        .dash-ovl-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .dash-sub-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 10px 2px; align-items: center; }
        .dash-sub-chips .sub-lbl {
            font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #64748b; margin-right: 2px;
        }
        .dash-ovl-stats { display: flex; gap: 26px; flex-wrap: wrap; margin: 2px 0 10px; }
        .dash-stat .s-lbl {
            font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #64748b;
        }
        .dash-stat .s-val { font-size: 19px; font-weight: 700; margin-top: 1px; }
        .dash-stat .s-val .unit { font-size: 11px; font-weight: 400; color: #64748b; }
        .dash-sec-title {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #64748b; margin: 18px 0 8px;
        }
        .dash-note {
            font-size: 12px; color: #94a3b8; background: rgba(148,163,184,0.07);
            border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; margin: 6px 0 2px;
        }

        /* Overlay activity tables + heat viewer */
        .dash-tbl-wrap { overflow-x: auto; border: 1px solid #334155; border-radius: 6px; }
        .dash-tbl-wrap table { border-collapse: collapse; width: 100%; font-size: 12px; }
        .dash-tbl-wrap th {
            position: sticky; top: 0; background: #24334a; color: #94a3b8;
            font-weight: 600; text-align: right; padding: 5px 10px;
        }
        .dash-tbl-wrap th.l, .dash-tbl-wrap td.l { text-align: left; }
        .dash-tbl-wrap th:first-child { text-align: left; }
        .dash-tbl-wrap td {
            padding: 4px 10px; text-align: right; border-top: 1px solid #334155;
            font-variant-numeric: tabular-nums;
        }
        .dash-tbl-wrap td:first-child { text-align: left; white-space: nowrap; }
        .dash-tbl-wrap tr.total-row td { background: #24334a; font-weight: 700; }
        .dash-wk { display: inline-block; min-width: 13px; font-weight: 700; margin-right: 6px; }
        .dash-heat-btn {
            background: none; border: none; color: #3987e5; text-decoration: underline;
            cursor: pointer; padding: 0; font: inherit; font-variant-numeric: tabular-nums;
        }
        .dash-heat-btn.active { color: #c98500; font-weight: 700; }
        tr.dash-detail > td { background: #182238; padding: 10px 12px; }
        .dash-heat-tbl {
            width: 100%; border-collapse: collapse; font-size: 12px;
            background: #1e293b; border: 1px solid #475569;
        }
        .dash-heat-tbl th {
            position: static; background: #2a3a55; padding: 4px 10px;
            font-weight: 600; color: #94a3b8; text-align: right;
        }
        .dash-heat-tbl th:first-child, .dash-heat-tbl th:nth-child(2) { text-align: left; }
        .dash-heat-tbl td {
            padding: 4px 10px; text-align: right; border-top: 1px solid #334155;
            font-variant-numeric: tabular-nums;
        }
        .dash-heat-tbl td:first-child, .dash-heat-tbl td:nth-child(2) { text-align: left; white-space: nowrap; }
        .dash-heat-hdr { cursor: pointer; }
        .dash-heat-hdr:hover td { background: rgba(57,135,229,0.08); }
        .dash-heat-hdr .chev { display: inline-block; font-size: 9px; margin-right: 6px; color: #64748b; }
        .dash-heat-hdr.open .chev { transform: rotate(90deg); color: #3987e5; }
        .dash-mat-row td { color: #94a3b8; }
        .dash-mat-row td:first-child { padding-left: 26px; }

        /* Skeleton loading animation */
        @keyframes dash-shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        .dash-skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 800px 100%;
            animation: dash-shimmer 1.4s infinite;
            border-radius: 3px;
            height: 12px;
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <button id="dashToggleBtn" title="Historical Dashboard">&#128197;</button>
    <div id="map"></div>
    <div id="dashboard">
        <div id="dashHeader">
            <div class="dash-year-nav">
                <button id="dashPrevYear" title="Previous year">&#8592;</button>
                <span id="dashYearLabel">—</span>
                <button id="dashNextYear" title="Next year">&#8594;</button>
            </div>
            <h1>Historical Dashboard</h1>
            <button id="dashBackBtn">&#8592; Back to Map</button>
        </div>
        <div id="dashCompareBar">
            <span class="cb-label">Compare</span>
            <span id="dashChips"></span>
            <button type="button" class="dash-chip" id="dashClearSel">Clear &times;</button>
            <span id="dashCompareHint">Pick up to two metrics &mdash; or click any row on a month card.</span>
        </div>
        <div id="dashTrend"></div>
        <div id="dashGrid"></div>
    </div>
    <div id="dashOvl">
        <div id="dashOvlPanel">
            <div id="dashOvlHead">
                <h2 id="dashOvlTitle"></h2>
                <button type="button" id="dashOvlClose" title="Close">&times;</button>
            </div>
            <div id="dashOvlBody"></div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="xlsx.full.min.js"></script>
    <script src="utils.js"></script>
    <script src="Burning.js"></script>
    <script src="Breaking.js"></script>
    <script src="Consumption.js"></script>
    <script src="Receiving.js"></script>
    <script src="NSReceiving.js"></script>
    <script src="DashboardCompare.js"></script>
    <script src="DashboardDetail.js"></script>
    <script src="Dashboard.js"></script>
    <script src="map.js"></script>
</body>
</html>
