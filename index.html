<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HENA Site 36</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;}
        #map {
            background: #334155;
            width: 100%;
            height: 100%;}
        .leaflet-control-layers-toggle {
            background: url('icons/harsco.png') no-repeat center center !important;
            background-size: 20px 20px !important;
            width: 30px !important;
            height: 30px !important;}
        #contextMenu {
            color: white;
            background-color: rgb(0, 0, 0);
            border: 1px solid #ffffff;
            border-radius: 4px;}
        #contextMenu ul {
            margin: 0;
            padding: 0;
            list-style: none;}
        #contextMenu li {
            padding: 5px 10px;
            cursor: pointer;}

        /* Search Modal Responsive Styles */
        #searchModal {
            position: fixed;
            bottom: 8px;
            right: 8px;
        }
        
        @media (max-width: 599px) {
            #searchModal {
                width: calc(100vw - 16px);
                max-width: calc(100vw - 16px);
            }
        }

        @media (min-width: 600px) {
            #searchModal {
                width: 500px;
            }
        }

        /* Ensure button styling consistency */
        #searchModalBackdrop button {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }

        #searchPanelToggle:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="xlsx.full.min.js"></script>
    <script src="map.js"></script>
</body>
</html>
